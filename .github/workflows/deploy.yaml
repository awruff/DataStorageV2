name: "Deploy"
on:
  push:
    branches:
      - main
    paths:
      - data/**
      - scripts/**
  # The Update Bundles workflow pushes with GITHUB_TOKEN, which cannot trigger
  # the push event above (GitHub's recursive-workflow guard). Chain off its
  # completion so bundle updates actually get published.
  workflow_run:
    workflows: ["Update Bundles"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Generate bundles and build site
    runs-on: ubuntu-latest
    # Skip when chained off a failed Update Bundles run; always run for direct
    # push / manual dispatch.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check bundles
        run: pnpm check

      - name: Generate bundles
        env:
          PACKWIZ_TOKEN: ${{ secrets.PACKWIZ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/generate-bundles.sh

      - name: Build site
        run: ./scripts/build-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
